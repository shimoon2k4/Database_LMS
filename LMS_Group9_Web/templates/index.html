<!DOCTYPE html>
<html>

<head>
    <title>LMS Group 9 - Quản lý Bài tập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <h2 class="mb-4">Hệ thống LMS - Nhóm 9</h2>

    <div class="card p-3 mb-4">
        <h5>Thêm Bài Tập Mới</h5>
        <div class="row g-2">
            <div class="col-md-2"><input id="ma" class="form-control" placeholder="Mã BT"></div>
            <div class="col-md-3"><input id="ten" class="form-control" placeholder="Tên bài tập"></div>
            <div class="col-md-2"><input id="diem" type="number" class="form-control" placeholder="Điểm"></div>
            <div class="col-md-3"><input id="date" type="datetime-local" class="form-control"></div>
            <div class="col-md-2"><button onclick="add()" class="btn btn-primary w-100">Lưu</button></div>
        </div>
    </div>

    <table class="table table-striped table-bordered mt-4">
        <thead class="table-dark">
            <tr>
                <th>Mã BT</th>
                <th>Tên</th>
                <th>Hạn nộp</th>
                <th>Điểm</th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>

    <script>
        async function add() {
            const data = {
                MaBT: document.getElementById('ma').value,
                TenBT: document.getElementById('ten').value,
                Diem: document.getElementById('diem').value,
                ThoiHan: document.getElementById('date').value,
                TgGH: 60, MaLop: 'L001', NoiDung: 'Yêu cầu mặc định'
            };
            const res = await fetch('/api/baitap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) { alert("Thành công!"); load(); }
            else { alert(result.error); } // Hiển thị lỗi từ Procedure 
        }

        async function load() {
            const res = await fetch('/api/list');
            const data = await res.json();
            const body = document.getElementById('listBody');
            body.innerHTML = data.map(i => `<tr><td>${i.MaBaiTap}</td><td>${i.TenBaiTap}</td><td>${i.ThoiHanLamBai}</td><td>${i.DiemToiDa}</td></tr>`).join('');
        }
        window.onload = load;
    </script>
</body>

</html>
